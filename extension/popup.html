<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 320px;
      font-family: 'Urbanist', system-ui, -apple-system, sans-serif;
      background: #060d1a;
      color: #ecfdf5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      border-bottom: 1px solid rgba(16, 185, 129, 0.1);
      background: rgba(6, 13, 26, 0.9);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: linear-gradient(135deg, #065f46, #10b981);
      box-shadow: 0 2px 10px rgba(16, 185, 129, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-name {
      color: #ecfdf5;
      font-weight: 800;
      font-size: 15px;
      letter-spacing: -0.03em;
    }

    .ai-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 9999px;
      background: rgba(16, 185, 129, 0.07);
      border: 1px solid rgba(16, 185, 129, 0.18);
    }

    .ai-badge-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #10b981;
      animation: glow-pulse 2s ease-in-out infinite;
    }

    .ai-badge-text {
      color: #6ee7b7;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    /* ── BODY ── */
    .body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── INFO CARD ── */
    .info-card {
      border-radius: 12px;
      padding: 12px 14px;
      background: linear-gradient(135deg, #071020 0%, #0a1628 100%);
      border: 1px solid rgba(16, 185, 129, 0.13);
    }

    .info-card-title {
      color: #ecfdf5;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    .info-card-desc {
      color: #6ee7b7;
      font-size: 11.5px;
      font-weight: 500;
      line-height: 1.55;
    }

    /* ── STEPS ── */
    .steps {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .step-num {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(16, 185, 129, 0.12);
      border: 1px solid rgba(16, 185, 129, 0.28);
      color: #10b981;
      font-size: 9px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .step-text {
      color: #a7f3d0;
      font-size: 11.5px;
      font-weight: 500;
    }

    /* ── DIVIDER ── */
    .divider {
      height: 1px;
      background: rgba(16, 185, 129, 0.08);
    }

    /* ── ACTION AREA ── */
    .action {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── BUTTON ── */
    #autofill-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 16px;
      background: linear-gradient(135deg, #059669, #10b981);
      color: #ecfdf5;
      border: none;
      border-radius: 12px;
      font-family: 'Urbanist', system-ui, sans-serif;
      font-weight: 700;
      font-size: 13.5px;
      letter-spacing: -0.01em;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(16, 185, 129, 0.35);
      transition: all 0.2s ease;
    }

    #autofill-btn:hover:not(:disabled) {
      background: linear-gradient(135deg, #047857, #059669);
      box-shadow: 0 6px 22px rgba(16, 185, 129, 0.5);
      transform: translateY(-1px);
    }

    #autofill-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* ── STATUS ── */
    #status-wrap {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 11px;
      border-radius: 9px;
      background: rgba(16, 185, 129, 0.05);
      border: 1px solid rgba(16, 185, 129, 0.1);
      min-height: 34px;
    }

    #status-icon {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #status {
      color: #6ee7b7;
      font-size: 11.5px;
      font-weight: 600;
      flex: 1;
    }

    #status.error {
      color: #f87171;
    }

    #status.success {
      color: #34d399;
    }

    /* ── FOOTER ── */
    .footer {
      padding: 9px 16px 12px;
      border-top: 1px solid rgba(16, 185, 129, 0.07);
      text-align: center;
    }

    .footer p {
      color: #2d5c47;
      font-size: 10px;
      font-weight: 500;
    }

    /* ── SPINNER ── */
    .spinner {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      border: 2px solid rgba(16, 185, 129, 0.2);
      border-top-color: #6ee7b7;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes glow-pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
          <path d="M9 12h6M9 16h6M9 8h3M5 3h14a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2z" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <circle cx="18" cy="18" r="4" fill="#10b981" stroke="white" stroke-width="1.5"/>
          <path d="M16.5 18l1.2 1.2L20 16.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="logo-name">JobFlow</span>
    </div>
    <div class="ai-badge">
      <span class="ai-badge-dot"></span>
      <span class="ai-badge-text">Auto-fill</span>
    </div>
  </div>

  <!-- Body -->
  <div class="body">
    <!-- Info card -->
    <div class="info-card">
      <p class="info-card-title">Job Application Auto-filler</p>
      <p class="info-card-desc">Detects form fields on this page and fills them using your parsed resume profile.</p>
    </div>

    <!-- How it works -->
    <div class="steps">
      <div class="step">
        <span class="step-num">1</span>
        <span class="step-text">Navigate to a job application form</span>
      </div>
      <div class="step">
        <span class="step-num">2</span>
        <span class="step-text">Click the button below to scan &amp; fill</span>
      </div>
      <div class="step">
        <span class="step-num">3</span>
        <span class="step-text">Review and submit your application</span>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Action area -->
    <div class="action">
      <button id="autofill-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
          <path d="M13 10V3L4 14h7v7l9-11h-7z" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Auto-fill Application Form
      </button>

      <div id="status-wrap">
        <span id="status-icon">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="#2d5c47" stroke-width="2"/>
            <path d="M12 8v4M12 16h.01" stroke="#2d5c47" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </span>
        <span id="status">Ready to scan form</span>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <p>Powered by JobFlow &amp; Groq AI</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
